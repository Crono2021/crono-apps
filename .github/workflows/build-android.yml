name: Build Cineflix Android APK

on:
  push:
    paths:
      - 'android/**'
      - 'www/**'
      - 'capacitor.config.json'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Capacitor CLI
        run: npm install

      - name: Sync Capacitor Android project
        run: |
          chmod +x node_modules/.bin/cap
          node_modules/.bin/cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── TDLib armeabi-v7a (32-bit Android TV support) ──────────────────────
      # Needed for Philips/MediaTek TVs running Android in 32-bit mode.
      # Cache key = hash of arm64 .so → only rebuilds if TDLib version changes.
      - name: Cache TDLib armeabi-v7a libtdjni.so
        id: cache-tdlib-armeabi
        uses: actions/cache@v4
        with:
          path: android/app/src/main/jniLibs/armeabi-v7a/libtdjni.so
          key: tdlib-armeabi-v7a-${{ hashFiles('android/app/src/main/jniLibs/arm64-v8a/libtdjni.so') }}

      - name: Build TDLib for armeabi-v7a (first-time only, ~35 min)
        if: steps.cache-tdlib-armeabi.outputs.cache-hit != 'true'
        run: |
          set -e

          # ── 1. Install NDK 25 explicitly (known stable version) ────────────
          sdkmanager --install "ndk;25.2.9519653" > /dev/null 2>&1
          NDK="$ANDROID_SDK_ROOT/ndk/25.2.9519653"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          API=21
          echo "NDK:       $NDK"
          echo "Toolchain: $TOOLCHAIN"
          ls "$TOOLCHAIN/bin/armv7a-linux-androideabi${API}-clang"

          # ── 2. Build tools (php is required for TDLib's code generator) ────
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake ninja-build gperf php

          # ── 3. Clone TDLib (latest HEAD, depth=1 for speed) ───────────────
          git clone --depth=1 https://github.com/tdlib/td.git /tmp/td

          # ── 4. Build OpenSSL 3.0 for armeabi-v7a ──────────────────────────
          # OpenSSL's "android-arm" target requires arm-linux-androideabi-gcc
          # which was removed in NDK 23+. Use "linux-generic32" with explicit
          # cross-compiler instead — works with any NDK version.
          curl -sSL "https://github.com/openssl/openssl/releases/download/openssl-3.0.15/openssl-3.0.15.tar.gz" \
               -o /tmp/openssl.tar.gz
          tar -xzf /tmp/openssl.tar.gz -C /tmp
          cd /tmp/openssl-3.0.15

          export CC="$TOOLCHAIN/bin/armv7a-linux-androideabi${API}-clang"
          export CXX="$TOOLCHAIN/bin/armv7a-linux-androideabi${API}-clang++"
          export AR="$TOOLCHAIN/bin/llvm-ar"
          export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
          export STRIP="$TOOLCHAIN/bin/llvm-strip"

          ./Configure linux-generic32 \
            -D__ANDROID_API__=$API \
            -march=armv7-a -mfloat-abi=softfp -mfpu=vfpv3-d16 \
            --prefix=/tmp/openssl-armeabi \
            no-shared no-tests
          make -j$(nproc) > /dev/null 2>&1
          make install_sw > /dev/null 2>&1
          echo "✅ OpenSSL 3.0.15 built for armeabi-v7a (linux-generic32)"

          # ── 5. Build TDLib (JNI) for armeabi-v7a ──────────────────────────
          mkdir /tmp/td/build-armeabi && cd /tmp/td/build-armeabi
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_NATIVE_API_LEVEL=$API \
            -DCMAKE_BUILD_TYPE=Release \
            -DTD_ENABLE_JNI=ON \
            -DOPENSSL_INCLUDE_DIR=/tmp/openssl-armeabi/include \
            -DOPENSSL_CRYPTO_LIBRARY=/tmp/openssl-armeabi/lib/libcrypto.a \
            -DOPENSSL_SSL_LIBRARY=/tmp/openssl-armeabi/lib/libssl.a \
            -GNinja \
            ..
          ninja tdjni -j$(nproc)

          # ── 6. Copy result to jniLibs ──────────────────────────────────────
          mkdir -p $GITHUB_WORKSPACE/android/app/src/main/jniLibs/armeabi-v7a
          find /tmp/td/build-armeabi -name "libtdjni.so" \
            -exec cp {} $GITHUB_WORKSPACE/android/app/src/main/jniLibs/armeabi-v7a/libtdjni.so \;
          echo "✅ libtdjni.so (armeabi-v7a) ready:"
          ls -lh $GITHUB_WORKSPACE/android/app/src/main/jniLibs/armeabi-v7a/

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cineflix-Android-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release (on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: "Cineflix Android ${{ github.ref_name }}"
