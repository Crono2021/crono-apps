name: Build Cineflix Android APK

on:
  push:
    paths:
      - 'android/**'
      - 'www/**'
      - 'capacitor.config.json'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Android repo
        uses: actions/checkout@v4

      # ── Build web app from the main cineflix repo ──
      - name: Checkout Web source (Crono2021/cineflix)
        uses: actions/checkout@v4
        with:
          repository: Crono2021/cineflix
          ref: master
          path: web-src
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web app
        run: |
          cd web-src
          npm ci --ignore-scripts
          npm run build
          echo "✅ Web built successfully"
          ls -la dist/

      - name: Copy web build to www/
        run: |
          rm -rf www/*
          cp -r web-src/dist/* www/
          echo "✅ www/ updated with fresh web build"
          ls -la www/

      # ── Capacitor sync ──
      - name: Install Capacitor dependencies
        run: npm install

      - name: Sync Capacitor Android project
        run: |
          chmod +x node_modules/.bin/cap
          node_modules/.bin/cap sync android

      # ── Android build ──
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cineflix-Android-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release (on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: "Cineflix Android ${{ github.ref_name }}"
