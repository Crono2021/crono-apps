name: Build Cineflix Android APK

on:
  push:
    paths:
      - 'android/**'
      - 'www/**'
      - 'capacitor.config.json'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Capacitor CLI
        run: npm install

      - name: Sync Capacitor Android project
        run: |
          chmod +x node_modules/.bin/cap
          node_modules/.bin/cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── TDLib armeabi-v7a (32-bit Android TV support) ──────────────────────
      # Cache key = hash of arm64 .so → only rebuilds if TDLib version changes.
      - name: Cache TDLib armeabi-v7a libtdjni.so
        id: cache-tdlib-armeabi
        uses: actions/cache@v4
        with:
          path: android/app/src/main/jniLibs/armeabi-v7a/libtdjni.so
          key: tdlib-armeabi-v7a-v2-${{ hashFiles('android/app/src/main/jniLibs/arm64-v8a/libtdjni.so') }}

      - name: Build TDLib for armeabi-v7a (first-time only, ~40 min)
        if: steps.cache-tdlib-armeabi.outputs.cache-hit != 'true'
        run: |
          set -e

          # ── 1. NDK (same version used by TDLib's official build scripts) ───
          sdkmanager --install "ndk;23.2.8568313" > /dev/null 2>&1
          NDK="$ANDROID_SDK_ROOT/ndk/23.2.8568313"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          API=21
          echo "NDK: $NDK"
          ls "$TOOLCHAIN/bin/armv7a-linux-androideabi${API}-clang"

          # ── 2. Build tools ─────────────────────────────────────────────────
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake ninja-build gperf php

          # ── 3. Clone TDLib ─────────────────────────────────────────────────
          # Clone the EXACT commit used to originally build TVGram's TDLib
          # (Hash found in TdApi.java: dd1b761fda7e47f4e0275c4d319f80a04db1997f)
          # This ensures libtdjni.so matches the Java layer and avoids JNI FatalError
          git clone https://github.com/tdlib/td.git /tmp/td
          cd /tmp/td
          git checkout dd1b761fda7e47f4e0275c4d319f80a04db1997f

          # ── 4. Build OpenSSL 1.1.1w for armeabi-v7a ───────────────────────
          # Following TDLib's official build-openssl.sh exactly.
          # Create arm-linux-androideabi-gcc symlink inside NDK toolchain/bin
          # so OpenSSL 1.1.1's android-arm Configure can find it via PATH scan.
          ln -sf "$TOOLCHAIN/bin/armv7a-linux-androideabi${API}-clang" \
                 "$TOOLCHAIN/bin/arm-linux-androideabi-gcc"

          export ANDROID_NDK_HOME="$NDK"
          export ANDROID_NDK_ROOT="$NDK"
          export PATH="$TOOLCHAIN/bin:$PATH"

          curl -sSL "https://github.com/openssl/openssl/archive/refs/tags/OpenSSL_1_1_1w.tar.gz" \
               -o /tmp/openssl.tar.gz
          tar -xzf /tmp/openssl.tar.gz -C /tmp
          cd /tmp/openssl-OpenSSL_1_1_1w

          ./Configure android-arm no-shared \
            -U__ANDROID_API__ -D__ANDROID_API__=$API -D__ARM_MAX_ARCH__=8
          make depend -s
          make -j$(nproc) -s

          mkdir -p /tmp/openssl/armeabi-v7a/lib
          cp libcrypto.a libssl.a /tmp/openssl/armeabi-v7a/lib/
          cp -r include /tmp/openssl/armeabi-v7a/
          echo "✅ OpenSSL 1.1.1w built for armeabi-v7a"

          # ── 5. Phase A: generate TDLib source files (native host build) ────
          # MUST be run from example/android/ — uses that CMakeLists.txt
          cd /tmp/td/example/android
          mkdir build-native && cd build-native
          cmake -DTD_GENERATE_SOURCE_FILES=ON ..
          cmake --build .
          echo "✅ Phase A: TDLib source files generated"

          # ── 6. Phase B: cross-compile libtdjni.so for armeabi-v7a ─────────
          # example/android/CMakeLists.txt defines the 'tdjni' target.
          cd /tmp/td/example/android
          mkdir build-armeabi && cd build-armeabi
          cmake \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DOPENSSL_ROOT_DIR="/tmp/openssl/armeabi-v7a" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -GNinja \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_STL=c++_static \
            -DANDROID_PLATFORM=android-21 \
            ..
          cmake --build . --target tdjni
          echo "✅ Phase B: libtdjni.so cross-compiled for armeabi-v7a"

          # ── 7. Copy result to jniLibs ──────────────────────────────────────
          mkdir -p $GITHUB_WORKSPACE/android/app/src/main/jniLibs/armeabi-v7a
          find /tmp/td/example/android/build-armeabi -name "libtdjni.so" \
            -exec cp {} $GITHUB_WORKSPACE/android/app/src/main/jniLibs/armeabi-v7a/libtdjni.so \;
          echo "✅ libtdjni.so (armeabi-v7a) ready:"
          ls -lh $GITHUB_WORKSPACE/android/app/src/main/jniLibs/armeabi-v7a/

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cineflix-Android-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release (on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: "Cineflix Android ${{ github.ref_name }}"
