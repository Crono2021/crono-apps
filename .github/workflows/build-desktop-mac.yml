name: Build Cineflix Desktop (macOS)

on:
  workflow_dispatch:

  jobs:
    build-mac:
        runs-on: macos-latest
            steps:
                  - name: Setup Node.js
                          uses: actions/setup-node@v4
                                  with:
                                            node-version: '20'

                                                  - name: Install mpv via Homebrew
                                                          run: brew install mpv

                                                                - name: Create project structure
                                                                        run: |
                                                                                  mkdir -p resources
                                                                                            cp $(which mpv) resources/mpv
                                                                                                      chmod +x resources/mpv
                                                                                                      
                                                                                                            - name: Create package.json
                                                                                                                    run: |
                                                                                                                              cat > package.json << 'EOF'
                                                                                                                                        {
                                                                                                                                                    "name": "cineflix-desktop",
                                                                                                                                                                "version": "1.0.2",
                                                                                                                                                                            "description": "Cineflix Desktop for macOS",
                                                                                                                                                                                        "main": "out/main/main.js",
                                                                                                                                                                                                    "scripts": {
                                                                                                                                                                                                                  "build": "electron-vite build && electron-builder --mac"
                                                                                                                                                                                                                              },
                                                                                                                                                                                                                                          "dependencies": {
                                                                                                                                                                                                                                                        "big-integer": "^1.6.52",
                                                                                                                                                                                                                                                                      "buffer": "^6.0.3",
                                                                                                                                                                                                                                                                                    "telegram": "^2.26.22",
                                                                                                                                                                                                                                                                                                  "vite-plugin-node-polyfills": "^0.17.0"
                                                                                                                                                                                                                                                                                                              },
                                                                                                                                                                                                                                                                                                                          "devDependencies": {
                                                                                                                                                                                                                                                                                                                                        "electron": "^32.3.3",
                                                                                                                                                                                                                                                                                                                                                      "electron-builder": "^25.1.8",
                                                                                                                                                                                                                                                                                                                                                                    "electron-vite": "^2.3.0",
                                                                                                                                                                                                                                                                                                                                                                                  "vite": "^6.0.0"
                                                                                                                                                                                                                                                                                                                                                                                              },
                                                                                                                                                                                                                                                                                                                                                                                                          "build": {
                                                                                                                                                                                                                                                                                                                                                                                                                        "appId": "com.cineflix.desktop",
                                                                                                                                                                                                                                                                                                                                                                                                                                      "productName": "Cineflix",
                                                                                                                                                                                                                                                                                                                                                                                                                                                    "artifactName": "Cineflix-${version}-macOS.${ext}",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  "npmRebuild": false,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "mac": {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "target": ["dmg"],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "category": "public.app-category.entertainment",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "identity": null,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "extraResources": [{"from": "resources/mpv", "to": "mpv"}]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "files": ["out/**/*"],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          "directories": {"output": "release"},
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        "asar": true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        EOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Download Cineflix Desktop source
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "Downloading source from cineflix-catalog..."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # For now, create minimal electron structure to test the build pipeline
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    mkdir -p electron/api src
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Install dependencies
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: npm install
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Build app
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: npm run build
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            CSC_IDENTITY_AUTO_DISCOVERY: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Upload macOS DMG
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            name: Cineflix-macOS
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      path: release/*.dmg
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                retention-days: 90
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
