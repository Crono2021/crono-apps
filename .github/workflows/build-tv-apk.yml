name: Build Modded TV APK

on:
  push:
    paths:
      - 'decompiled_apk/**'
      - '.github/workflows/build-tv-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apktool
        run: |
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar

      - name: Build APK with Apktool
        run: |
          java -jar apktool.jar b decompiled_apk -o unsigned.apk

      - name: Download Uber APK Signer
        run: |
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar

      - name: Sign and Align APK
        run: |
          java -jar uber-apk-signer.jar -a unsigned.apk --allowResign -o .

      - name: Upload Modded TV APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cineflix-AndroidTV-Modded
          path: "*aligned-debugSigned.apk"
          retention-days: 30
