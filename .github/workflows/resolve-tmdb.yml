name: Resolve TMDB Cache (Nightly)

on:
  schedule:
    # Every night at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger TMDB resolution on Railway
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RAILWAY_APP_URL }}/api/admin/resolve-tmdb" \
            -H "Authorization: Bearer $(curl -s -X POST '${{ secrets.RAILWAY_APP_URL }}/api/admin/login' \
              -H 'Content-Type: application/json' \
              -d '{"password":"${{ secrets.ADMIN_PASSWORD }}"}' | jq -r '.token')" \
            -H "Content-Type: application/json")
          echo "Response code: $RESPONSE"
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "409" ]; then
            echo "✅ TMDB resolve job started (or already running)"
          else
            echo "❌ Unexpected response: $RESPONSE"
            exit 1
          fi
