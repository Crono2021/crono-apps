<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelegramFlix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loading-screen" class="loading-screen active">
        <div class="loading-logo">
            <span class="logo-icon">🎬</span>
            <span class="logo-text">TelegramFlix</span>
        </div>
        <div class="loading-spinner"></div>
    </div>

    <!-- Login -->
    <div id="view-login" class="view">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <span class="logo-icon-large">🎬</span>
                    <h1>TelegramFlix</h1>
                    <p class="login-subtitle">Tus vídeos de Telegram, en streaming</p>
                </div>

                <div id="step-phone" class="login-step active">
                    <label>Número de teléfono</label>
                    <div class="input-group">
                        <input type="tel" id="input-phone" placeholder="+34 600 000 000">
                        <button id="btn-send-code" class="btn-primary">
                            <span class="btn-text">Enviar código</span>
                            <span class="btn-loader"></span>
                        </button>
                    </div>
                    <p id="phone-error" class="error-text"></p>
                </div>

                <div id="step-code" class="login-step">
                    <label>Código de verificación</label>
                    <p class="step-info">Revisa la app de Telegram en tu móvil</p>
                    <div class="input-group">
                        <input type="text" id="input-code" placeholder="12345" maxlength="6">
                        <button id="btn-verify" class="btn-primary">
                            <span class="btn-text">Verificar</span>
                            <span class="btn-loader"></span>
                        </button>
                    </div>
                    <p id="code-error" class="error-text"></p>
                </div>

                <div id="step-2fa" class="login-step">
                    <label>Contraseña de verificación en dos pasos</label>
                    <p class="step-info">Tu cuenta tiene 2FA activado</p>
                    <div class="input-group">
                        <input type="password" id="input-2fa" placeholder="Contraseña">
                        <button id="btn-2fa" class="btn-primary">
                            <span class="btn-text">Entrar</span>
                            <span class="btn-loader"></span>
                        </button>
                    </div>
                    <p id="twofa-error" class="error-text"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Chats -->
    <div id="view-chats" class="view">
        <header class="app-header">
            <div class="header-left">
                <span class="logo-icon-small">🎬</span>
                <h2>TelegramFlix</h2>
            </div>
            <div class="header-right">
                <span id="user-name" class="user-info"></span>
                <button id="btn-logout" class="btn-icon" title="Cerrar sesión">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16,17 21,12 16,7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </header>
        <div class="content-area">
            <div class="section-header">
                <h3>Tus grupos y canales</h3>
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-chats" placeholder="Buscar grupo...">
                </div>
            </div>
            <div id="chats-grid" class="chats-grid"></div>
            <div id="chats-loading" class="section-loading"><div class="loading-spinner"></div></div>
        </div>
    </div>

    <!-- Videos -->
    <div id="view-videos" class="view">
        <header class="app-header">
            <div class="header-left">
                <button id="btn-back-chats" class="btn-icon" title="Volver">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"></polyline></svg>
                </button>
                <h2 id="videos-title">Videos</h2>
            </div>
            <div class="header-right">
                <span id="videos-count" class="badge"></span>
            </div>
        </header>
        <div class="content-area">
            <div id="videos-grid" class="videos-grid"></div>
            <div id="videos-loading" class="section-loading"><div class="loading-spinner"></div></div>
            <button id="btn-load-more" class="btn-load-more" style="display:none">Cargar más vídeos</button>
        </div>
    </div>

    <!-- Player -->
    <div id="view-player" class="view">
        <div class="player-container">
            <div class="player-header">
                <button id="btn-back-videos" class="btn-icon btn-player-back" title="Volver">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"></polyline></svg>
                </button>
                <div class="player-title-info">
                    <h3 id="player-title"></h3>
                    <p id="player-subtitle"></p>
                </div>
            </div>
            <video id="video-player" controls></video>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
